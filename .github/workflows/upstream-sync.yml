name: Upstream Sync

on:
  schedule:
    - cron: '0 8 * * 1'  # Weekly Monday 8am UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream
        run: git remote add upstream https://github.com/ilang-ai/mem-forever.git || true

      - name: Fetch upstream
        run: git fetch upstream main

      - name: Sync engine files only
        run: |
          # Only sync instruction files, never touch .ilang/ user data
          git checkout upstream/main -- CLAUDE.md .cursorrules AGENTS.md GEMINI.md .github/copilot-instructions.md LICENSE 2>/dev/null || true
          
          # Check if anything changed
          if git diff --staged --quiet; then
            echo "Already up to date."
          else
            git config user.name "mem-forever[bot]"
            git config user.email "bot@ilang.ai"
            git commit -m "sync: upstream engine update $(date +%Y-%m-%d)"
            git push
          fi
